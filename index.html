<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
  />
  <title>PDF暗記アプリ Ver 3.1</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f1115" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PDF暗記 3.1" />

  <link rel="stylesheet" href="./style.css?v=31" />
</head>
<body>
  <div id="app">
    <section id="homeScreen" class="screen active">
      <header class="home-header">
        <h1>PDF暗記アプリ</h1>
        <div class="app-version-row">
          <p class="app-version">Ver 3.1</p>
          <button id="checkUpdateBtn" type="button" class="version-link-btn">
            更新を確認
          </button>
        </div>
        <p class="home-subtitle">Ver 2.4 の使い勝手を残しつつ、保存構造と描画効率を改善した版です</p>
      </header>

      <div class="home-actions">
        <label class="file-pick-btn">
          <input
            id="pdfFileInput"
            type="file"
            accept="application/pdf"
            hidden
          />
          PDFを開く
        </label>
        <button id="clearHistoryBtn" type="button" class="secondary-btn danger">
          履歴を削除
        </button>
      </div>

      <section class="recent-section">
        <div class="section-head">
          <h2>最近開いたPDF</h2>
          <p class="section-note">PDF 本体と学習データを分離保存して、2.4 より軽く再開しやすくしています</p>
        </div>
        <p id="recentEmpty" class="empty-text">まだPDFはありません</p>
        <div id="recentList" class="recent-list"></div>
      </section>
    </section>

    <section id="viewerScreen" class="screen">
      <header class="viewer-header">
        <div class="viewer-header-row">
          <button id="backBtn" type="button" class="header-btn">戻る</button>

          <div class="viewer-title-wrap">
            <div id="docTitle" class="doc-title">-</div>
            <div id="pageInfo" class="page-info">0 / 0</div>
          </div>
        </div>

        <div class="viewer-header-row sub">
          <div id="modeLabel" class="status-pill">学習</div>
          <div id="toolLabel" class="status-pill">待機中</div>
          <div id="renderLabel" class="status-pill subtle">準備中</div>
        </div>
      </header>

      <main id="viewerBody" class="viewer-body">
        <div id="pdfStageWrap" class="pdf-stage-wrap"></div>
      </main>

      <footer class="toolbar">
        <div class="toolbar-main">
          <div id="createTools" class="tool-set">
            <button id="drawLineBtn" type="button" class="tool-btn">線</button>
            <button id="drawRectBtn" type="button" class="tool-btn">四角</button>
            <button id="eraserBtn" type="button" class="tool-btn">消す</button>
            <button id="undoBtn" type="button" class="tool-btn">戻る</button>

            <div class="tool-control-group">
              <label class="tool-control size-control">
                <span>太さ</span>
                <input
                  id="brushSizeInput"
                  type="range"
                  min="8"
                  max="48"
                  step="2"
                  value="18"
                />
                <span id="brushSizeValue">18</span>
              </label>

              <div class="tool-control color-control">
                <span>色</span>
                <div class="color-chips" id="colorChips">
                  <button
                    type="button"
                    class="color-chip active"
                    data-color="rgba(12,18,28,0.96)"
                    style="--chip-color: rgba(12,18,28,0.96);"
                    aria-label="黒"
                  ></button>
                  <button
                    type="button"
                    class="color-chip"
                    data-color="rgba(222,56,75,0.9)"
                    style="--chip-color: rgba(222,56,75,0.9);"
                    aria-label="赤"
                  ></button>
                  <button
                    type="button"
                    class="color-chip"
                    data-color="rgba(46,104,221,0.9)"
                    style="--chip-color: rgba(46,104,221,0.9);"
                    aria-label="青"
                  ></button>
                  <button
                    type="button"
                    class="color-chip"
                    data-color="rgba(30,140,92,0.9)"
                    style="--chip-color: rgba(30,140,92,0.9);"
                    aria-label="緑"
                  ></button>
                  <button
                    type="button"
                    class="color-chip"
                    data-color="rgba(224,125,24,0.9)"
                    style="--chip-color: rgba(224,125,24,0.9);"
                    aria-label="オレンジ"
                  ></button>
                </div>
              </div>
            </div>
          </div>

          <div id="studyTools" class="tool-set is-hidden">
            <button id="showAllBtn" type="button" class="tool-btn">全表示</button>
            <button id="hideAllBtn" type="button" class="tool-btn">全隠し</button>

            <div class="tool-control-group">
              <div class="tool-control mark-control mark-control-compact">
                <div id="markTypeChips" class="mark-chips">
                  <button type="button" class="mark-chip" data-mark="star" aria-label="重要">★</button>
                  <button type="button" class="mark-chip" data-mark="review" aria-label="要復習">!</button>
                  <button type="button" class="mark-chip" data-mark="question" aria-label="わからない">?</button>
                  <button type="button" class="mark-chip" data-mark="done" aria-label="覚えた">○</button>
                  <button type="button" class="mark-chip mark-eraser-chip" data-mark="erase" aria-label="印を消す">
                    <span aria-hidden="true">⌫</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="mode-switch" aria-label="モード切替">
          <button id="createModeBtn" type="button" class="mode-switch-btn">
            作成
          </button>
          <button id="studyModeBtn" type="button" class="mode-switch-btn active">
            学習
          </button>
        </div>
      </footer>
    </section>
  </div>

  <script type="module" src="./app.js?v=31"></script>
</body>
</html>
