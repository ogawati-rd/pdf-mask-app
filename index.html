<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>PDF暗記アプリ</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f1115" />

  <!-- iPad / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PDF暗記" />

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <!-- ホーム -->
    <section id="homeScreen" class="screen active">
      <header class="home-header">
        <h1>PDF暗記アプリ</h1>
        <p class="home-subtitle">PDFを読み込み、任意の場所をマスクして学習</p>
      </header>

      <div class="home-actions">
        <label class="file-pick-btn">
          <input
            id="pdfFileInput"
            type="file"
            accept="application/pdf"
            hidden
          />
          PDFを開く
        </label>

        <button id="clearHistoryBtn" type="button" class="secondary-btn">
          履歴を削除
        </button>
      </div>

      <section class="recent-section">
        <h2>最近開いたPDF</h2>
        <p id="recentEmpty" class="empty-text">まだPDFはありません</p>
        <div id="recentList" class="recent-list"></div>
      </section>
    </section>

    <!-- ビューア -->
    <section id="viewerScreen" class="screen">
      <header class="viewer-header">
        <div class="viewer-header-row">
          <button id="backBtn" type="button" class="header-btn">戻る</button>
          <div class="viewer-title-wrap">
            <div id="docTitle" class="doc-title">-</div>
            <div id="pageInfo" class="page-info">0 / 0</div>
          </div>
        </div>

        <div class="viewer-header-row sub">
          <div id="modeLabel" class="status-pill">閲覧</div>
          <div id="guideModeLabel" class="status-pill">基準線:none</div>
        </div>
      </header>

      <main id="viewerBody" class="viewer-body">
        <div id="pdfStageWrap" class="pdf-stage-wrap">
          <div id="pdfStage" class="pdf-stage">
            <canvas id="pdfCanvas"></canvas>
            <canvas id="overlayCanvas"></canvas>
            <div id="guideLine" class="guide-line"></div>
          </div>
        </div>
      </main>

      <footer class="toolbar">
        <button id="viewModeBtn" type="button" class="tool-btn active">閲覧</button>
        <button id="drawLineBtn" type="button" class="tool-btn">線</button>
        <button id="drawRectBtn" type="button" class="tool-btn">四角</button>
        <button id="eraserBtn" type="button" class="tool-btn">消す</button>
        <button id="guideModeBtn" type="button" class="tool-btn">基準線</button>
        <button id="showAllBtn" type="button" class="tool-btn">全表示</button>
        <button id="hideAllBtn" type="button" class="tool-btn">全隠し</button>
        <button id="prevPageBtn" type="button" class="tool-btn">←</button>
        <button id="nextPageBtn" type="button" class="tool-btn">→</button>
      </footer>
    </section>
  </div>

  <!-- pdf.js を module として読み込む -->
  <script type="module">
    import * as pdfjsLib from "./pdf.mjs";
    window.pdfjsLib = pdfjsLib;
  </script>

  <!-- アプリ本体 -->
  <script src="./app.js"></script>
</body>
</html>
